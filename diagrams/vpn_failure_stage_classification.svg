<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="980"
     viewBox="0 0 1200 980"
     role="img" aria-labelledby="title desc">
<title id="title">VPN Tunnel Failure — Stage Classification Diagram</title>
<desc id="desc">Six IKE/IPsec negotiation failure stages mapped to their targeted deterministic diagnostic checks, with a cross-device correlation callout spanning all stages.</desc>

<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
  </marker>
  <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
  </filter>
</defs>

<!-- Background -->
<rect x="0" y="0" width="1200" height="980" fill="#ffffff"/>

<!-- Title -->
<text x="600" y="38" text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="20" font-weight="700" fill="#0f172a">
  VPN tunnel failure — stage classification
</text>

<!-- Column header: Failure stage -->
<text x="195" y="68" text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="600" fill="#64748b" letter-spacing="0.04em">
  FAILURE STAGE
</text>
<!-- Column header: Diagnostic checks -->
<text x="740" y="68" text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="600" fill="#64748b" letter-spacing="0.04em">
  DETERMINISTIC DIAGNOSTIC CHECKS
</text>

<!-- Header underline -->
<line x1="50" y1="78" x2="1150" y2="78" stroke="#e2e8f0" stroke-width="1"/>


