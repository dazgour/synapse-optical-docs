<text x="682" y="82"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="500" fill="#534ab7"
      letter-spacing="0.04em">
  RAW DIAGNOSTIC OUTPUT
</text>

<!-- PAN-OS field 1: IKE gateway state -->
<rect x="684" y="96" width="412" height="72" rx="10"
      fill="#cecbf6" stroke="#7f77dd" stroke-width="0.75"
