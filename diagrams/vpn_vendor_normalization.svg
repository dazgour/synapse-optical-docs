</text>

<!-- PAN-OS field 4: DPD + liveness state -->
<rect x="684" y="360" width="412" height="72" rx="10"
      fill="#cecbf6" stroke="#7f77dd" stroke-width="0.75"
      filter="url(#softShadow)"/>
<text x="890" y="386"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="15" font-weight="700" fill="#26215c">
  DPD + liveness state
</text>
<text x="890" y="410"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#3c3489">
  XML API · show vpn flow
</text>

<!-- ════════════════════════════════════════════
     Convergence lines — FortiGate → norm band
     From bottom of container (y=442) to top of band (y=506)
════════════════════════════════════════════ -->
<line x1="150" y1="442" x2="340" y2="506" stroke="#d85a30" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>
<line x1="230" y1="442" x2="380" y2="506" stroke="#d85a30" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>
<line x1="360" y1="442" x2="500" y2="506" stroke="#d85a30" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>
<line x1="450" y1="442" x2="560" y2="506" stroke="#d85a30" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>

<!-- Convergence lines — PAN-OS → norm band -->
<line x1="750" y1="442" x2="640" y2="506" stroke="#7f77dd" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>
<line x1="840" y1="442" x2="700" y2="506" stroke="#7f77dd" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>
<line x1="960" y1="442" x2="820" y2="506" stroke="#7f77dd" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>
<line x1="1050" y1="442" x2="860" y2="506" stroke="#7f77dd" stroke-width="0.75" stroke-dasharray="5 4" opacity="0.55"/>

<!-- ════════════════════════════════════════════
     Normalization band
════════════════════════════════════════════ -->
<rect x="60" y="506" width="1080" height="56" rx="12"
      fill="#d3d1c7" stroke="#888780" stroke-width="1"
      filter="url(#softShadow)"/>
<text x="600" y="534"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="16" font-weight="700" fill="#2c2c2a">
  Vendor normalization layer
</text>
<text x="600" y="552"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#444441">
  Translates vendor-specific interfaces, field names, and data structures into a shared schema
</text>

<!-- Arrow from norm band to output -->
<line x1="600" y1="562" x2="600" y2="594"
      stroke="#334155" stroke-width="2"
      marker-end="url(#arrowhead)"/>

<!-- ════════════════════════════════════════════
