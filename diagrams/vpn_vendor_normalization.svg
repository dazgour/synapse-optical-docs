<text x="890" y="234"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#3c3489">
  XML API · config / ike-crypto-profile
</text>

<!-- PAN-OS field 3: Proxy-ID + tunnel interface -->
<rect x="684" y="272" width="412" height="72" rx="10"
      fill="#cecbf6" stroke="#7f77dd" stroke-width="0.75"
      filter="url(#softShadow)"/>
<text x="890" y="298"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="15" font-weight="700" fill="#26215c">
  Proxy-ID + tunnel interface
</text>
<text x="890" y="322"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#3c3489">
