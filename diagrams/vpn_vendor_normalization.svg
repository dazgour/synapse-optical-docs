  Proposal summary
</text>
<text x="821" y="682"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#085041">
  enc · hash · DH group · PFS · SA lifetime
</text>

<!-- Normalized field 3: Selector / proxy-ID -->
<rect x="184" y="712" width="390" height="64" rx="10"
      fill="#9fe1cb" stroke="#1d9e75" stroke-width="0.75"
      filter="url(#softShadow)"/>
<text x="379" y="736"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="15" font-weight="700" fill="#04342c">
  Selector / proxy-ID
</text>
<text x="379" y="758"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#085041">
