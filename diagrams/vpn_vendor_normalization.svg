<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="860"
     viewBox="0 0 1200 860"
     role="img" aria-labelledby="title desc">
<title id="title">Vendor diagnostic normalization — FortiGate and PAN-OS</title>
<desc id="desc">FortiGate and PAN-OS vendor-specific diagnostic output, collected via different interfaces and structured differently, converging through a normalization layer into a single unified finding structure that the investigation workflow consumes identically regardless of vendor.</desc>

<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
  </marker>
  <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.07"/>
  </filter>
</defs>

<!-- Background -->
<rect x="0" y="0" width="1200" height="860" fill="#ffffff"/>

<!-- ════════════════════════════════════════════
     Column headers
════════════════════════════════════════════ -->
<text x="300" y="38"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="18" font-weight="700" fill="#712b13">
  FortiGate (FortiOS)
</text>
<text x="900" y="38"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="18" font-weight="700" fill="#3c3489">
  PAN-OS
</text>

<!-- ════════════════════════════════════════════
     FortiGate vendor container
════════════════════════════════════════════ -->
<rect x="60" y="52" width="480" height="390" rx="16"
      fill="#faece7" stroke="#f0997b" stroke-width="1"
      filter="url(#softShadow)"/>
<text x="82" y="82"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="500" fill="#993c1d"
      letter-spacing="0.04em">
  RAW DIAGNOSTIC OUTPUT
</text>

<!-- FortiGate field 1: IKE SA status -->
<rect x="84" y="96" width="412" height="72" rx="10"
      fill="#f5c4b3" stroke="#d85a30" stroke-width="0.75"
      filter="url(#softShadow)"/>
<text x="290" y="122"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="15" font-weight="700" fill="#4a1b0c">
  IKE SA status
</text>
<text x="290" y="146"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#712b13">
  REST API · /api/v2/monitor/vpn/ike
</text>

<!-- FortiGate field 2: Phase 1 / 2 proposals -->
<rect x="84" y="184" width="412" height="72" rx="10"
      fill="#f5c4b3" stroke="#d85a30" stroke-width="0.75"
      filter="url(#softShadow)"/>
<text x="290" y="210"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="15" font-weight="700" fill="#4a1b0c">
  Phase 1 / Phase 2 proposals
</text>
<text x="290" y="234"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#712b13">
  SSH · diagnose vpn ike status / list
</text>

<!-- FortiGate field 3: Route table + selectors -->
<rect x="84" y="272" width="412" height="72" rx="10"
      fill="#f5c4b3" stroke="#d85a30" stroke-width="0.75"
      filter="url(#softShadow)"/>
<text x="290" y="298"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="15" font-weight="700" fill="#4a1b0c">
  Route table + selectors
</text>
<text x="290" y="322"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#712b13">
  REST API · /api/v2/monitor/router/routing-table
</text>

<!-- FortiGate field 4: DPD + NAT-T state -->
<rect x="84" y="360" width="412" height="72" rx="10"
      fill="#f5c4b3" stroke="#d85a30" stroke-width="0.75"
      filter="url(#softShadow)"/>
<text x="290" y="386"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="15" font-weight="700" fill="#4a1b0c">
  DPD + NAT-T state
</text>
<text x="290" y="410"
      text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="12" font-weight="400" fill="#712b13">
  SSH · diagnose vpn tunnel list
</text>

